<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domain Chatbot</title>

  <!--
    Google Fonts: "Syne" for headings (geometric, technical feel)
    + "JetBrains Mono" for message bubbles (readable monospace feel)
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ── CSS Variables — edit these to retheme everything ── */
    :root {
      --bg: #0b0e14;            /* page background: deep navy */
      --surface: #141820;       /* card / bubble surfaces */
      --border: #1f2635;        /* subtle borders */
      --accent: #4af0b0;        /* brand green-teal */
      --accent-dim: #1a3d30;    /* accent with low opacity */
      --text: #e8edf5;          /* primary text */
      --text-muted: #5a6278;    /* secondary / placeholder text */
      --user-bg: #162a3f;       /* user bubble background */
      --bot-bg: #141f1a;        /* bot bubble background */
      --radius: 14px;
      --font-head: "Syne", sans-serif;
      --font-body: "JetBrains Mono", monospace;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Background grid texture ── */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 1;
      width: 100%; max-width: 740px;
      padding: 32px 24px 16px;
      display: flex; align-items: center; gap: 14px;
    }

    .logo {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent) 40%, transparent);
    }

    .header-text h1 {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .header-text p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Status pill */
    .status {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      padding: 4px 10px; border-radius: 20px;
    }

    .status-dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* ── Chat Window ── */
    .chat-window {
      position: relative; z-index: 1;
      width: 100%; max-width: 740px;
      flex: 1;
      display: flex; flex-direction: column;
      gap: 0;
      padding: 0 24px;
    }

    /* Messages list — scrollable area */
    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px 0 8px;
      min-height: 320px;
      max-height: 52vh;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Message Bubbles ── */
    .msg {
      display: flex;
      gap: 10px;
      animation: slideIn 0.25s ease-out both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.user .avatar  { background: #1b3a5c; }
    .msg.bot  .avatar  { background: var(--accent-dim); border: 1px solid var(--accent); }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 13.5px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid #1e3d5a;
      border-bottom-right-radius: 4px;
      color: #c8dff2;
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid #1e2e24;
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 18px;
    }

    .dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.1s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Error bubble */
    .msg.error .bubble {
      background: #1f0f0f;
      border-color: #5a1a1a;
      color: #f08080;
    }

    /* ── Divider above input ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    /* ── Input Row ── */
    .input-row {
      display: flex;
      gap: 10px;
      padding: 12px 0 28px;
    }

    #userInput {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13.5px;
      outline: none;
      resize: none;
      min-height: 48px;
      max-height: 120px;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    #userInput::placeholder { color: var(--text-muted); }
    #userInput:focus { border-color: var(--accent); }

    #sendBtn {
      background: var(--accent);
      color: #0a1a12;
      border: none;
      border-radius: var(--radius);
      padding: 0 20px;
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    #sendBtn:hover:not(:disabled) { opacity: 0.85; transform: scale(1.02); }
    #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Suggestion chips ── */
    .chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 0 0 12px;
    }

    .chip {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 11.5px;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── Footer note ── */
    .footer-note {
      position: relative; z-index: 1;
      font-size: 10.5px;
      color: var(--text-muted);
      text-align: center;
      padding: 0 0 18px;
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="logo">🤖</div>
    <div class="header-text">
      <h1>Domain Chatbot</h1>
      <p>Powered by Gemini · Context from Git</p>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      LIVE
    </div>
  </header>

  <!-- ── CHAT WINDOW ── -->
  <section class="chat-window">

    <!-- Scrollable messages -->
    <div id="messages">
      <!-- Welcome message injected by JS -->
    </div>

    <!-- Quick-start suggestion chips -->
    <div class="chips" id="chips">
      <button class="chip" onclick="sendChip(this)">What is this about?</button>
      <button class="chip" onclick="sendChip(this)">Give me a summary</button>
      <button class="chip" onclick="sendChip(this)">Key features?</button>
      <button class="chip" onclick="sendChip(this)">How do I get started?</button>
    </div>

    <div class="divider"></div>

    <!-- Input row -->
    <div class="input-row">
      <!--
        textarea auto-grows with JS.
        Pressing Enter (without Shift) sends the message.
      -->
      <textarea
        id="userInput"
        rows="1"
        placeholder="Ask anything about the domain…"
      ></textarea>
      <button id="sendBtn" onclick="sendMessage()">Send ↑</button>
    </div>

  </section>

  <div class="footer-note">
    Answers are grounded in the Git-fetched domain data &nbsp;·&nbsp;
    Powered by Google Gemini
  </div>

  <script>
    // ─── DOM references ───────────────────────────────────────────────────────
    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("userInput");
    const sendBtn    = document.getElementById("sendBtn");
    const chipsEl    = document.getElementById("chips");

    // ─── Show a welcome bot message on load ───────────────────────────────────
    appendMessage("bot",
      "👋  Hello! I'm a domain-specific assistant. My knowledge comes from a " +
      "Git repository, so my answers are grounded in that material.\n\n" +
      "Ask me anything, or tap one of the suggestions above."
    );

    // ─── Auto-grow textarea as user types ─────────────────────────────────────
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = inputEl.scrollHeight + "px";
    });

    // ─── Send on Enter (Shift+Enter = newline) ────────────────────────────────
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ─── Send a quick-chip message ────────────────────────────────────────────
    function sendChip(btn) {
      inputEl.value = btn.textContent;
      sendMessage();
      // Hide chips after first use so they don't clutter the UI
      chipsEl.style.display = "none";
    }

    // ─── MAIN SEND FUNCTION ───────────────────────────────────────────────────
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      // 1. Show user's message in the chat
      appendMessage("user", text);

      // 2. Clear input and disable button while waiting
      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;
      chipsEl.style.display = "none";

      // 3. Show animated "typing…" indicator
      const typingId = showTyping();

      try {
        // 4. POST to our /chat endpoint
        //    The server is on the same origin, so just use relative URL "/chat"
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          // body must be JSON with a "message" field — matches server.js
          body: JSON.stringify({ message: text }),
        });

        const data = await response.json();

        // 5. Remove typing indicator
        removeTyping(typingId);

        if (data.error) {
          // Show error in a red bubble
          appendMessage("error", "⚠️  " + data.error);
        } else {
          // Show the bot's reply
          appendMessage("bot", data.reply);
        }
      } catch (err) {
        // Network or parse error
        removeTyping(typingId);
        appendMessage("error", "⚠️  Could not reach the server. Is it running?");
      }

      // 6. Re-enable the send button
      sendBtn.disabled = false;
      inputEl.focus();
    }

    // ─── Append a message bubble ──────────────────────────────────────────────
    // role: "user" | "bot" | "error"
    function appendMessage(role, text) {
      const isBot  = role === "bot";
      const isUser = role === "user";

      const div = document.createElement("div");
      div.className = `msg ${role === "error" ? "bot error" : role}`;

      div.innerHTML = `
        <div class="avatar">${isUser ? "👤" : "🤖"}</div>
        <div class="bubble">${escapeHtml(text)}</div>
      `;

      messagesEl.appendChild(div);
      scrollToBottom();
    }

    // ─── Typing indicator ────────────────────────────────────────────────────
    function showTyping() {
      const id = "typing-" + Date.now();
      const div = document.createElement("div");
      div.className = "msg bot typing";
      div.id = id;
      div.innerHTML = `
        <div class="avatar">🤖</div>
        <div class="bubble">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      `;
      messagesEl.appendChild(div);
      scrollToBottom();
      return id;
    }

    function removeTyping(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    // ─── Utility: scroll chat to the bottom ───────────────────────────────────
    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ─── Utility: escape HTML to prevent XSS ─────────────────────────────────
    // Always escape user-supplied text before inserting into innerHTML
    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>
</body>
</html>
